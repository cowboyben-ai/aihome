    <div class="container">

        <!-- Header -->

        <!-- Input Card -->

            <div class="input-card">
                <h2>📋 輸入基本資料</h2>
                <div class="grid-2">
                    <div>
                        <label>安靜心率 <span>(bpm)</span></label>
                        <input type="number" id="rhr" min="30" max="120" placeholder="例：60" oninput="onInputChange()" />
                    </div>
                    <div>
                        <label>最大心率 <span>(bpm)</span></label>
                        <input type="number" id="mhr" min="100" max="250" placeholder="例：190"
                            oninput="onInputChange()" />
                    </div>
                </div>
                <div id="hrr-hint" style="display:none" class="hrr-hint"></div>
                <div id="error-hint" style="display:none" class="error-hint">⚠️ 請確認最大心率大於安靜心率，且數值合理</div>
                <button id="calc-btn" class="btn btn-disabled" onclick="calculate()">計算心率區間</button>
            </div>
        </div>

        <!-- Results (hidden until calculated) -->
        <div id="results" style="display:none"></div>

    </div>

    <script>

        ];

        const healthLevels = [
            { level: 1, title: '氪星超人', rhrMin: 0, rhrMax: 44, rhrLabel: '< 45', hrrLabel: '極大', emoji: '🦸', badgeClass: 'badge-lv1', cardClass: 'hcard-lv1', analysis: '你的心臟大概是汎合金做的。你睡覺時心跳慢到像是在冬眠，醫生量脈搏時可能會以為儀器壞了。你不需要跑步，是路在你的腳下移動。' },
            { level: 2, title: '奧運遺珠', rhrMin: 45, rhrMax: 49, rhrLabel: '45–49', hrrLabel: '非常大', emoji: '🏅', badgeClass: 'badge-lv2', cardClass: 'hcard-lv2', analysis: '你追公車不是為了搭車，是為了羞辱公車司機。你的心臟幫浦效率高到可以拿來灌溉農田，馬拉松對你來說只是暖身運動。' },

            { level: 4, title: '週末戰士', rhrMin: 55, rhrMax: 59, rhrLabel: '55–59', hrrLabel: '優秀', emoji: '⚔️', badgeClass: 'badge-lv4', cardClass: 'hcard-lv4', analysis: '你有在練喔！雖然平日被工作摧殘，但你的心臟依然強大。你可以輕鬆完成半馬，只是隔天走路姿勢會像剛學走路的企鵝。' },
            { level: 5, title: '健康模範生', rhrMin: 60, rhrMax: 64, rhrLabel: '60–64', hrrLabel: '良好', emoji: '📚', badgeClass: 'badge-lv5', cardClass: 'hcard-lv5', analysis: '普世標準的「健康人」。你的心臟規規矩矩，不多跳也不少跳。你活在教科書建議的完美區間，無聊但安全，保險業務員最愛你。' },
            { level: 6, title: '一般路人甲', rhrMin: 65, rhrMax: 69, rhrLabel: '65–69', hrrLabel: '普通', emoji: '🚶', badgeClass: 'badge-lv6', cardClass: 'hcard-lv6', analysis: '你就是那個統計學上的「平均值」。心臟功能堪用，但如果電梯壞了要爬 5 樓，你到達時可能會需要 3 分鐘的「沈思時間」來喘氣。' },
            { level: 7, title: '辦公室浮游生物', rhrMin: 70, rhrMax: 74, rhrLabel: '70–74', hrrLabel: '尚可', emoji: '🪸', badgeClass: 'badge-lv7', cardClass: 'hcard-lv7', analysis: '你的心跳主要受「老闆的腳步聲」和「截止日期」控制，而非運動。儲備心率剛好夠你應付趕捷運的衝刺，再多就不行了。' },
            { level: 8, title: '沙發守護者', rhrMin: 75, rhrMax: 79, rhrLabel: '75–79', hrrLabel: '偏低', emoji: '🛋️', badgeClass: 'badge-lv8', cardClass: 'hcard-lv8', analysis: '你的心臟表示：「我光是維持你坐著滑手機就很累了」。你的最大運動量通常發生在找不到遙控器的時候。建議開始練習「站起來」這項極限運動。' },
            { level: 9, title: '緊張大師', rhrMin: 80, rhrMax: 89, rhrLabel: '80–89', hrrLabel: '低', emoji: '😰', badgeClass: 'badge-lv9', cardClass: 'hcard-lv9', analysis: '你坐著不動的心跳，快得像別人正在慢跑。你的心臟似乎隨時都在準備應對一場不存在的戰鬥。深呼吸，放下那杯特大杯美式咖啡！' },

        function getCardiacAgeComment(age) {
            if (age <= 25) return { text: '你的心臟年齡比你的戶籍年齡年輕到可以去夜店被要求出示身分證。恭喜你，你的心臟活在青春裡！', emoji: '🎉' };
            if (age <= 35) return { text: '心臟年齡相當年輕！你的心臟還在青壯年，繼續保持，它會感謝你的。', emoji: '😎' };
            if (age <= 45) return { text: '心臟年齡中規中矩，正值壯年。你的心臟跟你一起努力生活，記得偶爾犒賞它一下。', emoji: '🙂' };
            if (age <= 55) return { text: '心臟年齡已步入中年，開始有點懷舊了。建議多運動，讓它重拾年輕的感覺。', emoji: '🤔' };
            if (age <= 65) return { text: '心臟年齡已屆退休門檻，它可能正在考慮申請勞保。是時候認真對待運動這件事了！', emoji: '😬' };
            return { text: '你的心臟年齡已經在規劃環遊世界退休之旅了。請立刻放下這個計算機，去運動！', emoji: '🆘' };
        }

        /* ── Reactive helpers ── */
        function getValues() {
            const rhr = parseInt(document.getElementById('rhr').value);
            const mhr = parseInt(document.getElementById('mhr').value);
            return { rhr, mhr };
        }

        function isValid(rhr, mhr) {
            return !isNaN(rhr) && !isNaN(mhr) && rhr > 0 && mhr > rhr;
        }

        function onInputChange() {
            const { rhr, mhr } = getValues();
            const hintEl = document.getElementById('hrr-hint');
            const errorEl = document.getElementById('error-hint');
            const btn = document.getElementById('calc-btn');

            const rhrInput = document.getElementById('rhr').value;
            const mhrInput = document.getElementById('mhr').value;

            if (rhrInput !== '' && mhrInput !== '') {
                if (isValid(rhr, mhr)) {
                    hintEl.innerHTML = `📊 最大儲備心率（HRR）= ${mhr} − ${rhr} = <strong>${mhr - rhr} bpm</strong>`;
                    hintEl.style.display = 'block';
                    errorEl.style.display = 'none';
                    btn.className = 'btn btn-active';
                    btn.disabled = false;
                } else {
                    hintEl.style.display = 'none';
                    errorEl.style.display = 'block';
                    btn.className = 'btn btn-disabled';
                    btn.disabled = true;
                }
            } else {
                hintEl.style.display = 'none';
                errorEl.style.display = 'none';
                btn.className = 'btn btn-disabled';
                btn.disabled = true;
            }

            // Clear results when inputs change
            document.getElementById('results').style.display = 'none';
            document.getElementById('results').innerHTML = '';
        }

        function zoneHR(pct, rhr, hrr) {
            return Math.round(hrr * (pct / 100) + rhr);
        }

        /* ── Main calculate ── */
        function calculate() {
            const { rhr, mhr } = getValues();
            if (!isValid(rhr, mhr)) return;

            const hrr = mhr - rhr;
            const matchedLevel = healthLevels.find(l => rhr >= l.rhrMin && rhr <= l.rhrMax);
            const cardiacAge = 220 - mhr;
            const comment = getCardiacAgeComment(cardiacAge);

            const resultsEl = document.getElementById('results');
            resultsEl.innerHTML = buildZoneTable(rhr, mhr, hrr)
                + buildHealthCard(matchedLevel, rhr, mhr, cardiacAge, comment)
                + buildLevelTable(matchedLevel);
            resultsEl.style.display = 'block';
        }

        /* ── Zone Table HTML ── */
        function buildZoneTable(rhr, mhr, hrr) {
            const rows = zones.map(z => {
                const lo = zoneHR(z.minPct, rhr, hrr);
                const hi = z.maxPct === 100 ? mhr : zoneHR(z.maxPct, rhr, hrr);
                const barLeft = (z.minPct - 50) * 2;
                const barWidth = (z.maxPct - z.minPct) * 2;
                return `
      <div class="zone-item ${z.zoneClass}">
        <div class="zone-row1">
          <div class="zone-left">
            <span class="badge ${z.badgeClass}">Zone ${z.zone}</span>
            <span class="zone-name">${z.name}</span>
          </div>
          <span class="zone-hr">${lo} – ${hi} <span>bpm</span></span>
        </div>
        <div class="zone-row2">
          <span class="zone-pct">${z.minPct}% – ${z.maxPct}% HRR</span>
          <div class="bar-track">
            <div class="bar-fill ${z.badgeClass}" style="left:${barLeft}%;width:${barWidth}%"></div>
          </div>
        </div>
        <p class="zone-effect">💡 ${z.effect}</p>
      </div>`;
            }).join('');

            return `
    <div class="card">
      <div class="card-header">
        <h2>📈 心率訓練區間表</h2>
        <p>安靜心率 ${rhr} bpm ／ 最大心率 ${mhr} bpm ／ HRR ${hrr} bpm</p>
      </div>
      <div class="zone-list">${rows}</div>
      <div class="zone-footer">公式：目標心率 = HRR × 強度% + 安靜心率</div>
    </div>`;
        }

        /* ── Health Card HTML ── */
        function buildHealthCard(level, rhr, mhr, cardiacAge, comment) {
            if (!level) return '';
            return `
    <div class="card ${level.cardClass}">
      <div class="card-header">
        <h2>🩺 你的心臟健康分析</h2>
        <p>根據你的安靜心率 ${rhr} bpm 所做的幽默診斷報告</p>
      </div>
      <div class="health-body">
        <div class="health-top">
          <span class="health-emoji">${level.emoji}</span>
          <div>
            <div class="health-title-row">
              <span class="badge ${level.badgeClass}">Lv. ${level.level}</span>
              <span class="health-title">${level.title}</span>
            </div>
            <p class="health-sub">安靜心率：${level.rhrLabel} bpm ／ 儲備心率：${level.hrrLabel}</p>
          </div>
        </div>
        <div class="analysis-box">${level.analysis}</div>
        <div class="cardiac-box">
          <div class="cardiac-top">
            <span class="cardiac-emoji">${comment.emoji}</span>
            <div class="cardiac-label">
              <p>免責心臟年齡</p>
              <p>公式：220 − 真實最大心率（${mhr} bpm）</p>
            </div>
            <div class="cardiac-age">
              <span>${cardiacAge}</span><span>歲</span>
            </div>
          </div>
          <div class="divider"></div>
          <p class="cardiac-comment">${comment.text}</p>
          <p class="cardiac-disclaimer">⚠️ 「免責」提醒：此數值僅為趣味估算，不代表真實醫學心臟年齡，請勿拿去嚇自己或家人。</p>
        </div>
      </div>
    </div>`;
        }

        /* ── 10-Level Table HTML ── */
        function buildLevelTable(matchedLevel) {
            const rows = healthLevels.map(l => {
                const isMe = matchedLevel && matchedLevel.level === l.level;
                const meTag = isMe ? `<span class="is-me-tag">← 這就是你！</span>` : '';
                return `
      <div class="level-item ${isMe ? 'is-me' : ''}">
        <div class="level-inner">
          <span class="level-emoji">${l.emoji}</span>
          <div class="level-content">
            <div class="level-title-row">
              <span class="badge ${l.badgeClass}">Lv. ${l.level}</span>
              <span class="level-name">${l.title}</span>
              ${meTag}
            </div>
            <div class="level-stats">
              <span>安靜心率：${l.rhrLabel} bpm</span>
              <span>儲備心率：${l.hrrLabel}</span>
            </div>
            <p class="level-analysis">${l.analysis}</p>
          </div>
        </div>
      </div>`;
            }).join('');

            return `
    <div class="card">
      <div class="card-header">
        <h2>😂 心臟健康程度 10 級量表</h2>
        <p>從外星人到沙發馬鈴薯，你在哪一級？</p>
      </div>
      ${rows}
      <div class="disclaimer-footer">
        ⚠️ <strong>免責聲明：</strong>本表格僅供娛樂與自我警惕，若有心臟不適或數值異常，請務必諮詢專業醫療人員，不要只聽 AI 瞎掰。
      </div>
    </div>`;
        }
    </script>
</body>

</html>
