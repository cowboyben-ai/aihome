<div class="calc-container">
    <div class="calc-header">
        <h2>💓 心率區間計算機</h2>
        <p>輸入您的年齡與安靜心率，計算科學化的運動區間。</p>
    </div>

    <div class="input-group">
        <label>您的年齡 (歲)</label>
        <input type="number" id="age" value="25" min="1" max="120">
    </div>

    <div class="input-group">
        <label>安靜心率 (BPM) - 可選，用於 Karvonen 公式</label>
        <input type="number" id="restingHR" value="60" min="30" max="150">
    </div>

    <button class="calc-btn" onclick="calculateZones()">立即計算</button>

    <div id="results" class="results">
        <p style="text-align:center; margin-bottom: 10px;">預估最大心率: <span id="maxHR"
                style="font-weight:700; color:#ef4444;"></span> BPM</p>
        <table class="zone-table">
            <thead>
                <tr>
                    <th>區間</th>
                    <th>範圍 (BPM)</th>
                    <th>目的</th>
                </tr>
            </thead>
            <tbody id="zoneBody">
                <!-- 由 JS 填入 -->
            </tbody>
        </table>
        <p style="font-size:0.7rem; color:#475569; margin-top:20px; text-align:center;">
            * 此工具採用 Karvonen 公式計算儲備心率區間，僅供參考。
        </p>
    </div>
</div>

<script>
    function calculateZones() {
        const age = parseInt(document.getElementById('age').value);
        const restingHR = parseInt(document.getElementById('restingHR').value) || 0;
        const maxHR = 220 - age;
        const hrReserve = maxHR - restingHR;

        const zones = [
            { name: "Zone 1 (熱身)", range: [0.5, 0.6], desc: "恢復、基礎代謝", class: "zone-1" },
            { name: "Zone 2 (燃脂)", range: [0.6, 0.7], desc: "有氧耐力、脂肪燃燒", class: "zone-2" },
            { name: "Zone 3 (有氧)", range: [0.7, 0.8], desc: "提升心肺能力", class: "zone-3" },
            { name: "Zone 4 (耐乳酸)", range: [0.8, 0.9], desc: "提升無氧閾值", class: "zone-4" },
            { name: "Zone 5 (爆發)", range: [0.9, 1.0], desc: "極限運動、短衝刺", class: "zone-5" }
        ];

        document.getElementById('maxHR').innerText = maxHR;

        let html = '';
        zones.forEach(z => {
            const low = Math.round(restingHR + (hrReserve * z.range[0]));
            const high = Math.round(restingHR + (hrReserve * z.range[1]));
            html += `
                <tr>
                    <td><span class="zone-name ${z.class}">${z.name}</span></td>
                    <td>${low} - ${high}</td>
                    <td class="desc">${z.desc}</td>
                </tr>
            `;
        });

        document.getElementById('zoneBody').innerHTML = html;
        document.getElementById('results').style.display = 'block';
    }
</script>
