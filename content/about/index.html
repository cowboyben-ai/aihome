title: "關於我"
layout: "single"

<style>
    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    /* 這裡的 style 會套用到整個頁面 */
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        background: #0f172a !important;
        /* 強制覆蓋主題背景 */
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
    }

    .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 20px;
        max-width: 560px;
        width: 100%;
        padding: 40px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, .4);
        margin: 40px auto;
        /* 置中 */
    }

    /* ── Avatar ── */
    .avatar-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
    }

    .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        box-shadow: 0 0 0 4px #334155;
    }

    /* ── Name & Title ── */
    .name {
        text-align: center;
        font-size: 1.6rem;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 6px;
        border: none;
        /* 移除主題可能帶有的邊框 */
    }

    .role {
        text-align: center;
        font-size: 0.9rem;
        color: #6366f1 !important;
        font-weight: 500;
        letter-spacing: .05em;
        margin-bottom: 20px;
    }

    /* ── Divider ── */
    .divider {
        height: 1px;
        background: #334155;
        margin: 20px 0;
    }

    /* ── Bio ── */
    .bio {
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.8;
        text-align: center;
        margin-bottom: 24px;
    }

    /* ── Skills ── */
    .section-title {
        font-size: 0.75rem;
        font-weight: 600;
        color: #64748b;
        letter-spacing: .1em;
        text-transform: uppercase;
        margin-bottom: 12px;
    }

    .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 24px;
        justify-content: center;
    }

    .tag {
        background: #0f172a;
        border: 1px solid #334155;
        color: #94a3b8;
        font-size: 0.8rem;
        padding: 4px 12px;
        border-radius: 999px;
        transition: border-color .2s, color .2s;
    }

    .tag:hover {
        border-color: #6366f1;
        color: #a5b4fc;
    }

    /* ── Social Links ── */
    .socials {
        display: flex;
        justify-content: center;
        gap: 12px;
    }

    .social-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 500;
        text-decoration: none;
        border: 1px solid #334155;
        color: #94a3b8;
        background: #0f172a;
        transition: background .2s, color .2s, border-color .2s;
    }

    .social-btn:hover {
        background: #1e293b;
        color: #e2e8f0;
        border-color: #6366f1;
    }

    .social-btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
        flex-shrink: 0;
    }

    /* ── Footer note ── */
    .footer-note {
        text-align: center;
        font-size: 0.75rem;
        color: #475569;
        margin-top: 24px;
    }
</style>

<div class="card">
    <!-- Avatar -->
    <div class="avatar-wrap">
        <div class="avatar">👨‍💻</div>
    </div>

    <!-- Name -->
    <h1 class="name">Cowboy Ben!</h1>
    <p class="role">放牛班的 AI 實驗室</p>

    <!-- Bio -->
    <p class="bio">
        熱愛用程式解決問題，喜歡把複雜的事情變簡單。<br />
        平時寫 TypeScript、玩 Hugo，偶爾也畫畫 UI。
    </p>

    <div class="divider"></div>

    <!-- Skills -->
    <p class="section-title">Tech Stack</p>
    <div class="tags">
        <span class="tag">TypeScript</span>
        <span class="tag">React</span>
        <span class="tag">Node.js</span>
        <span class="tag">Hugo</span>
        <span class="tag">Tailwind CSS</span>
        <span class="tag">Docker</span>
    </div>

    <div class="divider"></div>

    <!-- Social -->
    <div class="socials">

    </div>

    <p class="footer-note">✦ Open to collaborations &amp; freelance projects ✦</p>
</div>
